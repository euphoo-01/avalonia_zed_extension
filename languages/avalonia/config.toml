name = "Avalonia"
grammar = "xml"
path_suffixes = ["axaml"]
first_line_pattern = '^<'
block_comment = { start = "<!--", prefix = "", end = "-->", tab_size = 0 }
brackets = [{ start = "<", end = ">", close = true, newline = true }]
prettier_parser_name = "xml"
prettier_plugins = ["@prettier/plugin-xml"]
